<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>For Baavi - A Journey of Hope</title>
 
 <!-- Tailwind CSS -->
 <script src="https://cdn.tailwindcss.com"></script>
 
 <!-- Font Awesome Icons -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 
 <!-- Google Fonts -->
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
 
 <style>
 @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap');
 
 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 }
 
 body {
 font-family: 'Inter', sans-serif;
 background: linear-gradient(135deg, #0f2027 0%, #1e3a5f 50%, #74c0fc 100%);
 min-height: 100vh;
 color: #ffffff;
 overflow-x: hidden;
 }
 
 .gradient-bg {
 background: linear-gradient(135deg, #0f2027 0%, #1e3a5f 50%, #74c0fc 100%);
 }
 
 .page-bg {
 background: linear-gradient(135deg, #74c0fc 0%, #00d4ff 100%);
 }
 
 .quote-bg {
 background: linear-gradient(135deg, #00d4ff 0%, #00b4d8 100%);
 }
 
 .hero-gradient {
 background: linear-gradient(135deg, #0f2027 0%, #74c0fc 100%);
 }
 
 .card-glow {
 background: rgba(255, 255, 255, 0.05);
 backdrop-filter: blur(10px);
 border: 1px solid rgba(255, 255, 255, 0.1);
 }
 
 @keyframes fadeInUp {
 0% {
 opacity: 0;
 transform: translateY(30px);
 }
 100% {
 opacity: 1;
 transform: translateY(0);
 }
 }
 
 .animate-up {
 animation: fadeInUp 0.8s ease-out;
 }
 
 .hover-glow {
 transition: all 0.3s ease;
 }
 
 .hover-glow:hover {
 transform: translateY(-5px) scale(1.05);
 box-shadow: 0 20px 40px rgba(0, 212, 255, 0.4);
 }
 
 .section-transition {
 animation: fadeIn 1s ease;
 }
 
 @keyframes fadeIn {
 from { opacity: 0; transform: translateX(20px); }
 to { opacity: 1; transform: translateX(0); }
 }
 
 .text-gradient {
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
 -webkit-background-clip: text;
 -webkit-text-fill-color: transparent;
 background-clip: text;
 }
 
 .nav-link {
 position: relative;
 transition: color 0.3s ease;
 }
 
 .nav-link:hover {
 color: #74c0fc;
 }
 
 .nav-link.active {
 color: #74c0fc;
 }
 
 .nav-link.active::after {
 content: '';
 position: absolute;
 bottom: -2px;
 left: 0;
 right: 0;
 height: 2px;
 background: #74c0fc;
 animation: slideIn 0.3s ease;
 }
 
 @keyframes slideIn {
 from { transform: scaleX(0); }
 to { transform: scaleX(1); }
 }
 
 .quote-card {
 position: relative;
 padding-left: 2rem;
}
 
 .quote-card::before {
 content: '"';
 position: absolute;
 left: 0;
 top: -20px;
 font-size: 4rem;
 color: rgba(0, 212, 255, 0.1);
 font-family: Merriweather, serif;
}
 </style>
</head>
<body>
 <div id="root"></div>

 <!-- React from CDN -->
 <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
 <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
 <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

 <script type="text/babel">
 const { useState, useEffect } = React;

 // Deep spiritual quotes (without mentioning Bhagavad Gita)
 const spiritualQuotes = [
 {
 text: "You have a right to perform your prescribed duties, but you are not entitled to the fruits of your actions. Never consider yourself the cause of the results of your activities, and never be attached to not doing your duty.",
 source: "Ancient Wisdom, Chapter 2",
 theme: "Focus on your actions, not outcomes"
 },
 {
 text: "When meditation is mastered, the mind is unwavering like the flame of a lamp in a windless place.",
 source: "Ancient Wisdom, Chapter 6",
 theme: "Find inner peace amidst chaos"
 },
 {
 text: "Just as a solid rock is not shaken by the wind, wise people are not disturbed by praise or blame.",
 source: "Ancient Wisdom, Chapter 2",
 theme: "Remain steady through life's storms"
 },
 {
 text: "Remember the divine presence, fight for the light within, and surrender all your actions. You will be delivered from all darkness; do not fear.",
 source: "Ancient Wisdom, Chapter 18",
 theme: "Divine support and protection"
 },
 {
 text: "The soul is neither born, nor does it die at any time. It is eternal, ever-existing, and primeval. It is not slain when the body is slain.",
 source: "Ancient Wisdom, Chapter 2",
 theme: "Your true self is eternal and unbreakable"
 }
];

 const encouragement = [
 "Baavi, you are stronger than you believe. Every challenge you face is forging your soul into something beautiful.",
 "Like the lotus flower that blooms in muddy waters, your spirit will rise above any circumstance.",
 "This phase of your life is not your whole story—it's just one chapter where you'll discover your true strength.",
 "The universe is conspiring to make you more resilient, more compassionate, and more divine.",
 "You are not alone in this journey—every blessing, every challenge, every breath is guided by a divine hand."
];

 // Navigation Component
 const Navigation = ({ currentPage, setCurrentPage }) => {
 const navLinks = [
 { id: 'home', label: 'Home' },
 { id: 'joys', label: 'Small Joys' },
 { id: 'mom', label: 'Mom' },
 { id: 'coffee', label: 'Coffee Date' }
 ];

 return (
 <nav className="sticky top-0 z-50 bg-black/20 backdrop-blur-md">
 <div className="container mx-auto px-6 py-4">
 <div className="flex justify-between items-center">
 <div className="text-center">
 <h1 className="text-2xl font-bold text-white">
 For Baavi 💙
 </h1>
 </div>
 <div className="flex space-x-8">
 {navLinks.map(link => (
 <button
 key={link.id}
 onClick={() => setCurrentPage(link.id)}
 className={`nav-link ${currentPage === link.id ? 'active' : ''} text-white`}
 >
 {link.label}
 </button>
 ))}
 </div>
 </div>
 </div>
 </nav>
 );
 };

 // Main HomePage Component
 const HomePage = ({ setCurrentPage }) => {
 const [currentQuote, setCurrentQuote] = useState(0);
 const [currentEncouragement, setCurrentEncouragement] = useState('');
 const [isVisible, setIsVisible] = useState(false);

 useEffect(() => {
 setIsVisible(true);
 const interval = setInterval(() => {
 setCurrentQuote((prev) => (prev + 1) % spiritualQuotes.length);
 }, 5000);
 return () => clearInterval(interval);
 }, []);

 useEffect(() => {
 const randomEncouragement = encouragement[Math.floor(Math.random() * encouragement.length)];
 setCurrentEncouragement(randomEncouragement);
 }, []);

 const getRandomQuote = () => {
 setCurrentQuote((prev) => (prev + 1) % spiritualQuotes.length);
 };

 return (
 <div className="gradient-bg min-h-screen">
 <Navigation currentPage="home" setCurrentPage={setCurrentPage} />
 
 <section className="pt-20 pb-16 px-6">
 <div className="container mx-auto text-center">
 <h2 className="text-5xl md:text-8xl font-bold mb-8 animate-up">
 For <span className="text-blue-300">Baavi</span>
 </h2>
 <p className="text-xl md:text-2xl mb-12 text-white/90">
 You are stronger than you know
 </p>

 <div className="max-w-4xl mx-auto mb-16">
 <div
 className="quote-bg rounded-2xl p-8 shadow-2xl text-center"
 style={{ animationDelay: '0.2s' }}
 >
 <div className="quote-card">
 <p className="text-gray-100 italic text-lg leading-relaxed">
 "{spiritualQuotes[currentQuote].text}"
 </p>
 <cite className="text-blue-200 text-sm mt-4 font-semibold">
 — {spiritualQuotes[currentQuote].source}
 </cite>
 <p className="text-gray-200 text-sm mt-3">
 <strong>Theme:</strong> {spiritualQuotes[currentQuote].theme}
 </p>
 </div>
 </div>
 <button
 onClick={getRandomQuote}
 className="mt-6 gradient-bg text-white px-8 py-3 rounded-full hover:shadow-xl hover:scale-105 transition-all duration-300"
 >
 <i className="fas fa-sync-alt mr-2"></i>
 New Wisdom
 </button>
 </div>

 <div
 className="page-bg rounded-2xl p-8 text-center hover-glow animate-up"
 style={{ animationDelay: '0.4s' }}
 >
 <h3 className="text-3xl font-bold mb-4">A Message Just For You</h3>
 <p className="text-gray-100 leading-relaxed">
 {currentEncouragement}
 </p>
 <button
 onClick={getRandomQuote}
 className="mt-6 gradient-bg text-white px-8 py-3 rounded-full hover:shadow-xl hover:scale-105 transition-all duration-300"
 >
 <i className="fas fa-magic mr-2"></i>
 New Message
 </button>
 </div>
 </div>
 </section>

 <section className="py-12 px-6">
 <div className="container mx-auto">
 <h3 className="text-4xl font-bold text-center mb-8">Your Strength Journey</h3>
 <div className="grid md:grid-cols-3 gap-6">
 <div className="card-glow rounded-xl p-6 text-center hover-glow">
 <div className="text-5xl font-bold text-blue-500 mb-4">Courage</div>
 <h4 className="text-xl font-semibold mb-2">Every step forward is a victory</h4>
 <p className="text-gray-200 text-sm">You're braver than you believe</p>
 </div>
 <div className="card-glow rounded-xl p-6 text-center hover-glow">
 <div className="text-5xl font-bold text-blue-500 mb-4">Patience</div>
 <h4 className="text-xl font-semibold mb-2">Healing takes time</h4>
 <p className="text-gray-200 text-sm">Nature knows its perfect timing</p>
 </div>
 <div className="card-glow rounded-xl p-6 text-center hover-glow">
 <div className="text-5xl font-bold text-blue-500 mb-4">Hope</div>
 <h4 className="text-xl font-semibold mb-2">Light awaits you</h4>
 <p className="text-gray-200 text-sm">Darkest nights lead to brightest dawns</p>
 </div>
 </div>
 </div>
 </section>
 </div>
 );
 };

 // SmallJoysPage Component
 const SmallJoysPage = ({ setCurrentPage }) => {
 const [selectedJoy, setSelectedJoy] = useState(0);
 const [currentReflection, setCurrentReflection] = useState('');

 useEffect(() => {
 const randomReflection = [
 "Baavi, these small moments are the threads that weave the tapestry of your life. They're not just tiny joys—they're anchors holding you steady when storms rage.",
 "In your darkest moments, remember: even the mightiest tree grows from a tiny seed. Your life is held together by these beautiful moments you might otherwise overlook.",
 "The universe speaks to us in whispers, not shouts. These small joys are its way of saying 'I'm here, I see you, you're not forgotten.'",
 "When everything feels overwhelming, zoom out. Look for the beauty in the ordinary—that's where life's magic lives."
 ];
setCurrentReflection(randomReflection[Math.floor(Math.random() * randomReflection.length)]);
 }, []);

 const joys = [
 { moment: "The first sip of morning coffee", feeling: "That moment when the warmth spreads through you and the world feels possible again", icon: "☕" },
 { moment: "Finding money in an old pocket", feeling: "Like the universe is giving you a small gift for unexpected joy", icon: "💰" },
 { moment: "A stranger's unexpected smile", feeling: "Their joy becomes yours for a moment, and somehow you both feel lighter", icon: "😊" },
 { moment: "Sunlight filtering through your window", feeling: "Nature's reminder that even after the darkest night, the sun always rises", icon: "☀️" },
 { moment: "Your favorite song playing at the right moment", feeling: "Like the universe knows exactly what you need to hear", icon: "🎵" },
 { moment: "A child's laughter", feeling: "Pure innocence that can dissolve even the heaviest heart", icon: "😄" }
 ];

 return (
 <div className="gradient-bg min-h-screen">
 <Navigation currentPage="joys" setCurrentPage={setCurrentPage} />
 
 <section className="pt-20 pb-16 px-6">
 <div className="container mx-auto text-center">
 <h2 className="text-5xl md:text-8xl font-bold mb-8">Small Joys That Hold Life Together</h2>
 <p className="text-xl md:text-2xl mb-12 text-white/90">
 What's the one small thing that made you unexpectedly happy?
 </p>

 <div className="max-w-4xl mx-auto mb-16">
 <div className="page-bg rounded-2xl p-8 shadow-2xl">
